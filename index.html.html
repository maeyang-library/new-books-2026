<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>2026학년도 1차 신간도서</title><style>:root{--bg:#f7f4ef;--card:#fffdf9;--ink:#2d2a26;--muted:#756f68;--line:#e7ded2;--accent:#6f8f72}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;background:linear-gradient(180deg,#fbf8f2 0%,var(--bg) 100%);color:var(--ink)}.hero{padding:34px 18px 18px;text-align:center}h1{margin:0 0 8px;font-size:clamp(28px,4vw,46px);letter-spacing:-.04em}.subtitle{color:var(--muted);font-size:16px;margin:0}header{position:sticky;top:0;z-index:10;backdrop-filter:blur(8px);background:rgba(247,244,239,.92);border-bottom:1px solid var(--line)}.wrap{max-width:1180px;margin:0 auto;padding:22px 18px}.toolbar{display:grid;grid-template-columns:1fr 170px 130px;gap:10px;align-items:center}input,select{width:100%;border:1px solid var(--line);border-radius:14px;background:white;padding:13px 14px;font-size:15px;outline:none}.count{color:var(--muted);font-size:14px;margin-top:10px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:22px;padding:20px 18px 44px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 8px 18px rgba(45,42,38,.07)}.coverBox{aspect-ratio:2/3;background:#eee7dc;display:flex;align-items:center;justify-content:center}.cover{width:100%;height:100%;object-fit:cover;display:block}.fallback{padding:14px;text-align:center;color:#7a746d;font-weight:700;line-height:1.45;word-break:keep-all}.info{padding:13px 13px 15px}.title{font-weight:800;font-size:15px;line-height:1.35;margin:0 0 8px}.meta{margin:0;color:var(--muted);font-size:12.5px;line-height:1.45}.tag{display:inline-block;margin-top:9px;padding:4px 8px;border-radius:999px;background:#eef3ed;color:#526e55;font-size:11.5px}.empty{text-align:center;color:var(--muted);padding:60px 20px;display:none}footer{text-align:center;color:var(--muted);font-size:12px;padding:0 18px 32px}@media(max-width:700px){.toolbar{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.wrap{padding:16px 14px}}</style></head><body><section class="hero"><h1>2026학년도 1차 신간도서</h1><p class="subtitle">혜윰마루 도서관에 새로 들어올 책을 미리 둘러보세요.</p></section><header><div class="wrap"><div class="toolbar"><input id="search" type="search" placeholder="책 제목, 저자, 출판사, ISBN 검색"><select id="category"><option value="">전체 분야</option></select><select id="sort"><option value="no">목록순</option><option value="title">제목순</option><option value="category">분야순</option></select></div><div class="count" id="count">데이터를 불러오는 중...</div></div></header><main class="wrap"><div class="grid" id="grid"></div><div class="empty" id="empty">검색 결과가 없습니다.</div></main><footer>표지는 수집된 공개 이미지 주소를 사용합니다. 일부 도서는 표지가 표시되지 않을 수 있습니다.</footer><script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQ7rrs83x08g1cL47cBwJBWuQYaFVPu809-T4eYoVxaN8VoMj6gJIaC3nNTjs26fXtmI9c00Reprf5y/pub?gid=718148944&single=true&output=csv';
const els={search:document.getElementById('search'),category:document.getElementById('category'),sort:document.getElementById('sort'),count:document.getElementById('count'),grid:document.getElementById('grid'),empty:document.getElementById('empty')};let BOOKS=[];
function parseCSV(t){const rows=[];let r=[],c='',q=false;for(let i=0;i<t.length;i++){const ch=t[i],n=t[i+1];if(ch==='"'&&q&&n==='"'){c+='"';i++}else if(ch==='"'){q=!q}else if(ch===','&&!q){r.push(c);c=''}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++;r.push(c);if(r.some(v=>String(v).trim()!==''))rows.push(r);r=[];c=''}else c+=ch}r.push(c);if(r.some(v=>String(v).trim()!==''))rows.push(r);return rows}
const clean=v=>String(v??'').trim();const onlyNum=v=>clean(v).replace(/[^0-9Xx]/g,'');const isIsbn=v=>/^\d{10}(\d{3})?$/.test(onlyNum(v));const isUrl=v=>/^https?:\/\//i.test(clean(v));function pickCover(cells){const urls=cells.map(clean).filter(isUrl);return urls.find(u=>/image\.aladin|covers\.openlibrary|books\.google|thumbnail/i.test(u))||urls[0]||''}
function norm(r){const a=clean(r[0]),b=clean(r[1]),c=clean(r[2]),d=clean(r[3]),e=clean(r[4]),f=clean(r[5]),g=clean(r[6]),h=clean(r[7]),i=clean(r[8]),j=clean(r[9]);let o={no:Number(a)||9999,isbn:'',title:'',author:'',publisher:'',category:'',note:'',cover:''};if(isIsbn(b)){o.isbn=onlyNum(b);o.title=c;o.author=d;o.publisher=e;o.category=f;o.note=g;o.cover=pickCover([h,g,i,j])}else if(isIsbn(f)){o.title=b;o.author=c;o.publisher=d;o.category=e;o.isbn=onlyNum(f);o.cover=pickCover([g,h,i,j])}else return null;if(!o.title||!o.isbn)return null;return o}
function dedupe(arr){const m=new Map();for(const b of arr){const k=b.isbn||b.title;const old=m.get(k);if(!old)m.set(k,b);else{const score=x=>(x.cover?10:0)+(x.note?2:0)+(x.no&&x.no<9000?1:0);m.set(k,score(b)>=score(old)?{...old,...b,note:b.note||old.note,cover:b.cover||old.cover,no:Math.min(old.no,b.no)}:old)}}return[...m.values()].filter(b=>b.no>=1&&b.no<=557).sort((a,b)=>a.no-b.no)}
async function load(){try{const res=await fetch(CSV_URL+'&t='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error(res.status);const rows=parseCSV(await res.text()).slice(1).map(norm).filter(Boolean);BOOKS=dedupe(rows);init()}catch(e){els.count.innerHTML='데이터를 불러오지 못했습니다.<br><small>GitHub에 올린 뒤 새로고침해 주세요. '+e+'</small>'}}
function init(){[...new Set(BOOKS.map(b=>b.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko')).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;els.category.appendChild(o)});render()}
function getFiltered(){const q=els.search.value.trim().toLowerCase(),cat=els.category.value;let arr=BOOKS.filter(b=>(!cat||b.category===cat)&&(!q||[b.title,b.author,b.publisher,b.isbn,b.category,b.note].join(' ').toLowerCase().includes(q)));const s=els.sort.value;if(s==='title')arr.sort((a,b)=>a.title.localeCompare(b.title,'ko'));else if(s==='category')arr.sort((a,b)=>(a.category||'').localeCompare(b.category||'','ko')||a.no-b.no);else arr.sort((a,b)=>a.no-b.no);return arr}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function render(){const arr=getFiltered();els.count.textContent=`총 ${BOOKS.length}권 중 ${arr.length}권 표시`;els.grid.innerHTML='';els.empty.style.display=arr.length?'none':'block';for(const b of arr){const card=document.createElement('article');card.className='card';const img=b.cover?`<img class="cover" src="${b.cover}" alt="${esc(b.title)} 표지" loading="lazy" onerror="this.parentElement.innerHTML='<div class=&quot;fallback&quot;>${esc(b.title)}</div>'">`:`<div class="fallback">${esc(b.title)}</div>`;card.innerHTML=`<div class="coverBox">${img}</div><div class="info"><p class="title">${esc(b.title)}</p><p class="meta">${esc(b.author||'')}</p><p class="meta">${esc(b.publisher||'')} · ISBN ${esc(b.isbn||'')}</p>${b.category?`<span class="tag">${esc(b.category)}</span>`:''}</div>`;els.grid.appendChild(card)}}els.search.addEventListener('input',render);els.category.addEventListener('change',render);els.sort.addEventListener('change',render);load();
</script></body></html>
