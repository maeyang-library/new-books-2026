const grid = document.getElementById('grid');
const search = document.getElementById('search');
const category = document.getElementById('category');
const sort = document.getElementById('sort');
const count = document.getElementById('count');
const empty = document.getElementById('empty');

function coverUrl(isbn) {
  return `https://books.google.com/books/content?vid=ISBN${isbn}&printsec=frontcover&img=1&zoom=1&edge=curl&source=gbs_api`;
}

function bookLink(book) {
  // 독서로 등록 전에는 알라딘 검색으로 연결합니다. 나중에 독서로 주소로 바꿀 수 있습니다.
  return `https://www.aladin.co.kr/search/wsearchresult.aspx?SearchTarget=All&SearchWord=${encodeURIComponent(book.isbn)}`;
}

function short(text, n=46) {
  text = String(text || '');
  return text.length > n ? text.slice(0,n) + '…' : text;
}

function initCategories() {
  const cats = [...new Set(BOOKS.map(b => b.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));
  for (const c of cats) {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    category.appendChild(opt);
  }
}

function render() {
  const q = search.value.trim().toLowerCase();
  const cat = category.value;
  let list = BOOKS.filter(b => {
    const hay = `${b.title} ${b.author} ${b.publisher} ${b.isbn} ${b.category} ${b.note}`.toLowerCase();
    return (!q || hay.includes(q)) && (!cat || b.category === cat);
  });

  const s = sort.value;
  list.sort((a,b) => {
    if (s === 'title') return a.title.localeCompare(b.title, 'ko');
    if (s === 'category') return (a.category || '').localeCompare(b.category || '', 'ko') || Number(a.no)-Number(b.no);
    return Number(a.no) - Number(b.no);
  });

  count.textContent = `총 ${BOOKS.length}권 중 ${list.length}권 표시`;
  empty.style.display = list.length ? 'none' : 'block';
  grid.innerHTML = list.map(b => `
    <article class="card">
      <a href="${bookLink(b)}" target="_blank" rel="noopener">
        <div class="coverBox">
          <img class="cover" loading="lazy" src="${coverUrl(b.isbn)}" alt="${escapeHtml(b.title)} 표지"
               onerror="this.remove(); this.parentElement.innerHTML='<div class=&quot;fallback&quot;>${escapeHtml(short(b.title,34))}</div>';">
        </div>
        <div class="info">
          <h2 class="title">${escapeHtml(short(b.title,42))}</h2>
          <p class="meta">${escapeHtml(short(b.author,38))}</p>
          <p class="meta">${escapeHtml(b.publisher)} · ISBN ${escapeHtml(b.isbn)}</p>
          ${b.category ? `<span class="tag">${escapeHtml(b.category)}</span>` : ''}
        </div>
      </a>
    </article>
  `).join('');
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

initCategories();
render();
search.addEventListener('input', render);
category.addEventListener('change', render);
sort.addEventListener('change', render);
</script>
