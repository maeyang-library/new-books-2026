<head>
<meta charset="utf-8">

<style>
  :root {
    --bg:#f7f4ef; --card:#fffdf9; --ink:#2d2a26; --muted:#756f68;
    --line:#e7ded2; --accent:#6f8f72; --accent2:#d8a45b;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",Arial,sans-serif;
    background:linear-gradient(180deg,#fbf8f2 0%, var(--bg) 100%); color:var(--ink);
  }
  .hero { padding:34px 18px 18px; text-align:center; }
  h1 { margin:0 0 8px; font-size:clamp(28px,4vw,46px); letter-spacing:-.04em; }
  .subtitle { color:var(--muted); font-size:16px; margin:0; }
  header {
    position:sticky; top:0; z-index:10; backdrop-filter:blur(8px);
    background:rgba(247,244,239,.92); border-bottom:1px solid var(--line);
  }
  .wrap { max-width:1180px; margin:0 auto; padding:22px 18px; }
  .toolbar {
    display:grid; grid-template-columns:1fr 170px 130px; gap:10px; align-items:center;
  }
  input, select {
    width:100%; border:1px solid var(--line); border-radius:14px; background:white;
    padding:13px 14px; font-size:15px; outline:none;
  }
  input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(111,143,114,.15); }
  .count { color:var(--muted); font-size:14px; margin-top:10px; }
  .grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
    gap:22px; padding:20px 18px 44px;
  }
  .card {
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    overflow:hidden; box-shadow:0 8px 18px rgba(45,42,38,.07);
    transition:.18s transform,.18s box-shadow;
  }
  .card:hover { transform:translateY(-3px); box-shadow:0 12px 26px rgba(45,42,38,.12); }
  .coverBox { aspect-ratio:2/3; background:#eee7dc; display:flex; align-items:center; justify-content:center; }
  .cover { width:100%; height:100%; object-fit:cover; display:block; }
  .fallback {
    padding:14px; text-align:center; color:#7a746d; font-weight:800; line-height:1.45;
    word-break:keep-all;
  }
  .info { padding:13px 13px 15px; }
  .title { font-weight:800; font-size:15px; line-height:1.35; margin:0 0 8px; letter-spacing:-.03em; }
  .meta { margin:0; color:var(--muted); font-size:12.5px; line-height:1.45; }
  .tag {
    display:inline-block; margin-top:9px; padding:4px 8px; border-radius:999px;
    background:#eef3ed; color:#526e55; font-size:11.5px;
  }
  a { color:inherit; text-decoration:none; }
  .empty { text-align:center; color:var(--muted); padding:60px 20px; display:none; }
  footer { text-align:center; color:var(--muted); font-size:12px; padding:0 18px 32px; }
  @media (max-width:700px) {
    .toolbar { grid-template-columns:1fr; }
    .grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .wrap { padding:16px 14px; }
  }
</style>
</head>

  </section>

  <header>
    <div class="wrap">
      <div class="toolbar">

          <option value="category">분야순</option>
        </select>
      </div>
      <div class="count" id="count"></div>
    </div>
  </header>

  <main class="wrap">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">검색 결과가 없습니다.</div>

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function short(text, n=46) {
  text = String(text || '');
  return text.length > n ? text.slice(0,n) + '…' : text;
}

function initCategories() {
  const cats = [...new Set(BOOKS.map(b => b.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));

    opt.textContent = c;
    category.appendChild(opt);
  }
}

  const cat = category.value;

  let list = BOOKS.filter(b => {
    const hay = `${b.title} ${b.author} ${b.publisher} ${b.isbn} ${b.category}`.toLowerCase();
    return (!q || hay.includes(q)) && (!cat || b.category === cat);
  });

  if (sort.value === 'title') list.sort((a,b)=>a.title.localeCompare(b.title,'ko'));
  if (sort.value === 'category') list.sort((a,b)=>(a.category||'').localeCompare(b.category||'','ko') || Number(a.no)-Number(b.no));
  if (sort.value === 'no') list.sort((a,b)=>Number(a.no)-Number(b.no));

  count.textContent = `총 ${BOOKS.length}권 중 ${list.length}권 표시`;
  empty.style.display = list.length ? 'none' : 'block';

  grid.innerHTML = list.map(b => `
    <article class="card">
      <a href="${escapeHtml(bookLink(b))}" target="_blank" rel="noopener">
        <div class="coverBox">
          <img class="cover" loading="lazy" src="${escapeHtml(b.cover)}"
            alt="${escapeHtml(b.title)} 표지"
            onerror="this.remove(); this.parentElement.innerHTML='<div class=&quot;fallback&quot;>${escapeHtml(short(b.title,34))}</div>';">
        </div>
        <div class="info">
          <h2 class="title">${escapeHtml(short(b.title,42))}</h2>
          <p class="meta">${escapeHtml(short(b.author,38))}</p>
          <p class="meta">${escapeHtml(b.publisher)} · ISBN ${escapeHtml(b.isbn)}</p>
          ${b.category ? `<span class="tag">${escapeHtml(b.category)}</span>` : ''}
        </div>
      </a>
    </article>
  `).join('');
}

initCategories();
render();
search.addEventListener('input', render);
category.addEventListener('change', render);
sort.addEventListener('change', render);
</script>
</body>
</html>
